name: BladeWeapons
version: '1.0.18'
main: dev.systemcrash.blade.weapons.BladeWeaponsPlugin
api-version: '1.21'
description: Blade legendary weapons with Demora resource pack models
folia-supported: true
commands:
  bladeitem:
    description: Give Blade legendary weapons and admin tools
    usage: /bladeitem give <weapon> [player] | /bladeitem clearcd [player] | /bladeitem reload
    permission: bladeitem.give
    aliases: [bi, bladeitems]
  bladeweapons:
    description: BladeWeapons menu and utilities
    usage: /bladeweapons menu
    aliases: [bw]
permissions:
  bladeitem.give:
    description: Give legendary weapons
    default: op
  bladeitem.clearcd:
    description: Clear legendary weapon cooldowns
    default: op
  bladeitem.reload:
    description: Reload BladeWeapons config
    default: op
  bladeweapons.menu:
    description: Open legendary weapons menu
    default: op
